<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF T3 · 🌿 L'Environnement</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;1,400&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
<style>

/* ── MLI PALETTE ── */
:root {
  --mli-blue:   #3AABDC;
  --mli-green:  #5DB88A;
  --mli-dark:   #404040;
  --mli-grey:   #6E7E8A;
  --mli-light:  #F0F7FB;
  --mli-bg:     #F7F9FB;
  --pour-bg:    #EAF7F0;
  --pour-border:#5DB88A;
  --contre-bg:  #FEF0F0;
  --contre-border:#E06060;
  --word-bg:    #FFFEF8;
  --word-border:#E8E0C8;
  --shadow:     0 2px 12px rgba(58,171,220,.13);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Lato', sans-serif;
  background: var(--mli-bg);
  color: var(--mli-dark);
  min-height: 100vh;
}

/* ══════════════════════════════
   HEADER
══════════════════════════════ */
header {
  background: white;
  border-bottom: 3px solid var(--mli-blue);
  padding: 0 2rem;
  display: flex;
  align-items: stretch;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: 0 2px 10px rgba(0,0,0,.08);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 1.4rem;
  padding: .9rem 0;
}

/* SVG logo inline recreation */
.mli-logo {
  display: flex;
  align-items: center;
  gap: .7rem;
  text-decoration: none;
}

.logo-mark {
  display: flex;
  gap: 3px;
  align-items: flex-start;
}

.logo-col {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.logo-b1 { width: 14px; height: 32px; background: var(--mli-blue); border-radius: 2px 2px 0 0; }
.logo-b2 { width: 14px; height: 16px; background: var(--mli-blue); }
.logo-g1 { width: 14px; height: 20px; background: var(--mli-green); margin-top: 8px; }
.logo-g2 { width: 14px; height: 16px; background: var(--mli-green); }

.logo-text-wrap { line-height: 1.1; }
.logo-text-top {
  font-style: italic;
  font-size: .72rem;
  color: var(--mli-grey);
  font-weight: 300;
}
.logo-text-top span { color: var(--mli-blue); font-style: italic; }
.logo-text-mid {
  font-size: 1.15rem;
  font-weight: 700;
  letter-spacing: .08em;
  color: var(--mli-dark);
}
.logo-text-mid .M { color: var(--mli-blue); }
.logo-text-bot {
  font-style: italic;
  font-size: .72rem;
  color: var(--mli-grey);
  font-weight: 300;
}
.logo-text-bot span { color: var(--mli-green); font-style: italic; }

.header-divider {
  width: 1px;
  background: #D8E8EF;
  margin: .6rem 0;
}

.header-title {
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.header-title h1 {
  font-size: 1rem;
  font-weight: 700;
  color: var(--mli-dark);
  letter-spacing: .03em;
}

.header-title .sub {
  font-family: 'Noto Serif SC', serif;
  font-size: .72rem;
  color: var(--mli-grey);
  margin-top: .1rem;
}

/* tab nav */
.tab-nav {
  display: flex;
  align-items: stretch;
  gap: 0;
}

.tab-btn {
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  padding: 0 1.1rem;
  font-family: 'Lato', sans-serif;
  font-size: .82rem;
  font-weight: 700;
  color: var(--mli-grey);
  cursor: pointer;
  letter-spacing: .04em;
  text-transform: uppercase;
  transition: all .2s;
  margin-bottom: -3px;
}

.tab-btn:hover { color: var(--mli-blue); }
.tab-btn.active { color: var(--mli-blue); border-bottom-color: var(--mli-blue); }

/* ══════════════════════════════
   BREADCRUMB
══════════════════════════════ */
.breadcrumb {
  display: none;
  align-items: center;
  gap: .5rem;
  padding: .6rem 2rem;
  font-size: .78rem;
  color: var(--mli-grey);
  background: white;
  border-bottom: 1px solid #E4EDF3;
}

.breadcrumb.visible { display: flex; }

.breadcrumb a {
  color: var(--mli-blue);
  text-decoration: none;
  cursor: pointer;
  font-weight: 700;
}

.breadcrumb a:hover { text-decoration: underline; }
.breadcrumb .sep { color: #C0D0DA; }

/* ══════════════════════════════
   VIEWS
══════════════════════════════ */
.view { display: none; padding: 2rem; max-width: 1100px; margin: 0 auto; }
.view.active { display: block; }

/* ══════════════════════════════
   COVER — 9 category cards
══════════════════════════════ */
.cover-header {
  text-align: center;
  margin-bottom: 2rem;
}

.cover-header h2 {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--mli-dark);
  margin-bottom: .3rem;
}

.cover-header p {
  font-family: 'Noto Serif SC', serif;
  font-size: .88rem;
  color: var(--mli-grey);
}

.cover-header .badge {
  display: inline-block;
  background: var(--mli-blue);
  color: white;
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: .25rem .8rem;
  border-radius: 20px;
  margin-bottom: .6rem;
}

.cat-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.2rem;
}

.cat-card {
  background: white;
  border-radius: 12px;
  border: 1.5px solid #E0EDF5;
  padding: 1.6rem 1.4rem;
  cursor: pointer;
  transition: all .22s;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: .5rem;
  position: relative;
  overflow: hidden;
}

.cat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--mli-blue), var(--mli-green));
  opacity: 0;
  transition: opacity .22s;
}

.cat-card:hover { border-color: var(--mli-blue); transform: translateY(-3px); box-shadow: 0 6px 22px rgba(58,171,220,.2); }
.cat-card:hover::before { opacity: 1; }

.cat-icon-big { font-size: 2.2rem; line-height: 1; }
.cat-name { font-size: 1rem; font-weight: 700; color: var(--mli-dark); }
.cat-cn { font-family: 'Noto Serif SC', serif; font-size: .78rem; color: var(--mli-grey); }
.cat-count { font-size: .72rem; color: var(--mli-blue); font-weight: 700; margin-top: .3rem; }

/* ══════════════════════════════
   TOPIC LIST — questions in a category
══════════════════════════════ */
.topic-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.5rem;
}

.topic-header .cat-icon-big { font-size: 2rem; }
.topic-header h2 { font-size: 1.25rem; font-weight: 700; color: var(--mli-dark); }
.topic-header .cat-cn { font-family: 'Noto Serif SC', serif; font-size: .85rem; color: var(--mli-grey); }

.q-grid {
  display: flex;
  flex-direction: column;
  gap: .75rem;
}

.q-row {
  background: white;
  border-radius: 10px;
  border: 1.5px solid #E0EDF5;
  padding: 1.1rem 1.4rem;
  cursor: pointer;
  transition: all .18s;
  box-shadow: 0 1px 6px rgba(0,0,0,.05);
  display: flex;
  align-items: center;
  gap: 1rem;
}

.q-row:hover { border-color: var(--mli-blue); background: var(--mli-light); }

.q-num-badge {
  min-width: 28px; height: 28px;
  background: linear-gradient(135deg, var(--mli-blue), var(--mli-green));
  color: white;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .72rem; font-weight: 700;
  flex-shrink: 0;
}

.q-row-text { flex: 1; }
.q-row-fr { font-size: .93rem; color: var(--mli-dark); line-height: 1.4; }
.q-row-cn { font-family: 'Noto Serif SC', serif; font-size: .75rem; color: var(--mli-grey); margin-top: .15rem; }
.q-arrow { color: var(--mli-blue); font-size: 1rem; flex-shrink: 0; }

/* ══════════════════════════════
   QUESTION DETAIL
══════════════════════════════ */
.detail-question-box {
  background: linear-gradient(135deg, var(--mli-blue) 0%, #2A8FBE 100%);
  color: white;
  border-radius: 12px;
  padding: 1.5rem 1.8rem;
  margin-bottom: 1.4rem;
  box-shadow: 0 4px 18px rgba(58,171,220,.3);
}

.detail-question-box .q-label {
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  opacity: .75;
  margin-bottom: .5rem;
}

.detail-question-box .q-fr {
  font-size: 1.15rem;
  font-weight: 700;
  line-height: 1.5;
  margin-bottom: .4rem;
}

.detail-question-box .q-cn {
  font-family: 'Noto Serif SC', serif;
  font-size: .83rem;
  opacity: .85;
}

/* arguments */
.arg-cols {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1.2rem;
}

.arg-panel {
  background: white;
  border-radius: 10px;
  border: 1.5px solid #E0EDF5;
  overflow: hidden;
}

.arg-panel-head {
  display: flex;
  align-items: center;
  gap: .5rem;
  padding: .7rem 1rem;
  font-size: .75rem;
  font-weight: 700;
  letter-spacing: .07em;
  text-transform: uppercase;
}

.arg-panel.pour .arg-panel-head { background: var(--pour-bg); color: #2E7D53; border-bottom: 2px solid var(--pour-border); }
.arg-panel.contre .arg-panel-head { background: var(--contre-bg); color: #C04040; border-bottom: 2px solid var(--contre-border); }

.arg-panel-head .cn-label {
  font-family: 'Noto Serif SC', serif;
  font-size: .72rem;
  opacity: .7;
  text-transform: none;
  letter-spacing: 0;
  font-weight: 400;
}

.arg-list { padding: .8rem 1rem; }

.arg-item { margin-bottom: .85rem; }
.arg-item:last-child { margin-bottom: 0; }

.arg-main { font-size: .87rem; font-weight: 700; color: var(--mli-dark); margin-bottom: .15rem; line-height: 1.4; }
.arg-cn-small { font-family: 'Noto Serif SC', serif; font-size: .73rem; color: var(--mli-grey); margin-bottom: .25rem; }
.arg-ex {
  font-size: .78rem;
  color: #555;
  font-style: italic;
  padding: .3rem .6rem;
  border-left: 3px solid #D0DDE8;
  line-height: 1.45;
  background: #F8FAFB;
  border-radius: 0 4px 4px 0;
}

/* ══════════════════════════════
   WORD-STYLE TEMPLATE
══════════════════════════════ */
.word-section {
  background: var(--word-bg);
  border: 1.5px solid var(--word-border);
  border-radius: 10px;
  overflow: hidden;
  margin-top: 1.2rem;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}

.word-section-title {
  background: #F2ECD8;
  border-bottom: 1.5px solid var(--word-border);
  padding: .6rem 1.2rem;
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: #7A6A40;
  display: flex;
  align-items: center;
  gap: .5rem;
}

.word-doc {
  padding: 1.6rem 2rem;
  font-size: .88rem;
  line-height: 1.8;
  color: #2A2A2A;
}

.word-doc .doc-title {
  text-align: center;
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: .3rem;
  color: var(--mli-dark);
  letter-spacing: .01em;
}

.word-doc .doc-sub {
  text-align: center;
  font-size: .82rem;
  color: var(--mli-grey);
  margin-bottom: 1.2rem;
  font-style: italic;
}

.word-doc hr { border: none; border-top: 1px solid #E0D8C0; margin: .8rem 0; }

.word-section-head {
  font-weight: 700;
  color: var(--mli-dark);
  text-decoration: underline;
  text-underline-offset: 3px;
  text-decoration-color: var(--mli-blue);
  margin-bottom: .1rem;
}

.word-highlight {
  background: #FFFB80;
  border-radius: 2px;
  padding: 0 2px;
}

.word-tag {
  display: inline-block;
  background: #E8F4FB;
  color: var(--mli-blue);
  font-size: .68rem;
  font-weight: 700;
  padding: .1rem .4rem;
  border-radius: 3px;
  letter-spacing: .04em;
  vertical-align: middle;
}

.word-note {
  font-family: 'Noto Serif SC', serif;
  font-size: .75rem;
  color: var(--mli-grey);
  font-style: normal;
  display: block;
  margin-left: 1rem;
}

.word-blank {
  display: inline-block;
  border-bottom: 1.5px solid var(--mli-blue);
  min-width: 120px;
  color: var(--mli-blue);
  font-style: italic;
  font-size: .84rem;
}

.word-fill {
  color: #1A5276;
  font-weight: 600;
  font-style: normal;
}

.word-sub {
  font-size: .72rem;
  color: var(--mli-grey);
  font-style: italic;
  font-weight: 400;
}

/* ── EXTRA PRACTICE SECTION ── */
.extra-section {
  margin-top: 1.4rem;
  border-radius: 10px;
  border: 1.5px dashed #B0CCE0;
  overflow: hidden;
  background: white;
}

.extra-header {
  display: flex;
  align-items: center;
  gap: .7rem;
  padding: .9rem 1.2rem;
  cursor: pointer;
  background: #F0F7FB;
  user-select: none;
  transition: background .15s;
}

.extra-header:hover { background: #E3F0F8; }

.extra-header > span:first-child {
  font-weight: 700;
  font-size: .88rem;
  color: var(--mli-blue);
}

.extra-cn {
  font-family: "Noto Serif SC", serif;
  font-size: .73rem;
  color: var(--mli-grey);
}

.extra-count {
  font-size: .72rem;
  background: var(--mli-blue);
  color: white;
  border-radius: 10px;
  padding: .1rem .5rem;
  font-weight: 700;
  margin-left: auto;
}

.extra-chevron { font-size: .75rem; color: var(--mli-grey); }
.extra-body { padding: .8rem 1.2rem 1.2rem; }
.extra-random-bar { margin-bottom: 1rem; }

.random-btn {
  background: linear-gradient(135deg, var(--mli-blue), var(--mli-green));
  color: white;
  border: none;
  border-radius: 20px;
  padding: .5rem 1.2rem;
  font-family: "Lato", sans-serif;
  font-size: .82rem;
  font-weight: 700;
  cursor: pointer;
  transition: opacity .18s;
}
.random-btn:hover { opacity: .88; }

.random-result {
  margin-top: .8rem;
  background: linear-gradient(135deg, var(--mli-blue) 0%, #2A8FBE 100%);
  border-radius: 10px;
  padding: 1rem 1.2rem;
}
.random-q { color: white; font-size: .95rem; font-weight: 700; line-height: 1.5; }

.extra-list { display: flex; flex-direction: column; gap: .45rem; }

.extra-item {
  display: flex;
  gap: .6rem;
  align-items: flex-start;
  padding: .45rem .5rem;
  border-radius: 6px;
  transition: background .12s;
}
.extra-item:hover { background: #F0F7FB; }

.extra-num {
  min-width: 22px; height: 22px;
  background: #E0EDF5;
  color: var(--mli-blue);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .68rem; font-weight: 700;
  flex-shrink: 0; margin-top: 1px;
}
.extra-text { font-size: .83rem; color: var(--mli-dark); line-height: 1.45; }

/* ══════════════════════════════
   BACK BUTTON
══════════════════════════════ */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: .4rem;
  background: none;
  border: 1.5px solid var(--mli-blue);
  color: var(--mli-blue);
  font-family: 'Lato', sans-serif;
  font-size: .82rem;
  font-weight: 700;
  padding: .4rem .9rem;
  border-radius: 20px;
  cursor: pointer;
  transition: all .18s;
  margin-bottom: 1.2rem;
  text-transform: uppercase;
  letter-spacing: .05em;
}

.back-btn:hover { background: var(--mli-blue); color: white; }

/* ══════════════════════════════
   RESPONSIVE
══════════════════════════════ */
@media (max-width: 680px) {
  .cat-grid { grid-template-columns: 1fr 1fr; }
  .arg-cols { grid-template-columns: 1fr; }
  .view { padding: 1.2rem 1rem; }
  header { padding: 0 1rem; }
  .tab-btn { padding: 0 .6rem; font-size: .72rem; }
}

@media (max-width: 440px) {
  .cat-grid { grid-template-columns: 1fr; }
}

/* ── EXTRA TOGGLE BUTTON (in topic header) ── */
.extra-toggle-btn {
  flex-shrink: 0;
  background: white;
  border: 1.5px solid var(--mli-blue);
  color: var(--mli-blue);
  font-family: 'Lato', sans-serif;
  font-size: .78rem;
  font-weight: 700;
  padding: .45rem .9rem;
  border-radius: 20px;
  cursor: pointer;
  transition: all .18s;
  white-space: nowrap;
  letter-spacing: .02em;
}
.extra-toggle-btn:hover,
.extra-toggle-btn.active {
  background: var(--mli-blue);
  color: white;
}

/* ── EXTRA PANEL (below header, above question list) ── */
.extra-panel {
  background: #F0F7FB;
  border: 1.5px solid #C8DFF0;
  border-radius: 10px;
  padding: 1rem 1.2rem 1.2rem;
  margin-bottom: 1.2rem;
}


/* ══════════════════════════════
   DETAIL TABS
══════════════════════════════ */
.detail-tabs {
  display: flex;
  gap: .4rem;
  margin-bottom: 1.2rem;
  border-bottom: 2px solid #E0EDF5;
  padding-bottom: 0;
}

.dtab {
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  padding: .55rem 1.1rem;
  font-family: 'Lato', sans-serif;
  font-size: .82rem;
  font-weight: 700;
  color: var(--mli-grey);
  cursor: pointer;
  transition: all .18s;
  letter-spacing: .02em;
  border-radius: 6px 6px 0 0;
}

.dtab:hover { color: var(--mli-blue); background: #F0F7FB; }
.dtab.active { color: var(--mli-blue); border-bottom-color: var(--mli-blue); background: none; }

.dtab-content { display: none; }
.dtab-content.active { display: block; }

/* ══════════════════════════════
   VOCABULARY
══════════════════════════════ */
.vocab-container {
  display: flex;
  flex-direction: column;
  gap: 1.2rem;
}

.vocab-section {
  background: white;
  border-radius: 10px;
  border: 1.5px solid #E0EDF5;
  overflow: hidden;
  box-shadow: 0 1px 6px rgba(0,0,0,.05);
}

.vocab-section-head {
  padding: .65rem 1.1rem;
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: .5rem;
}

.vocab-section-head.noms     { background: #EAF5F0; color: #1E6B4A; border-bottom: 2px solid #5DB88A; }
.vocab-section-head.verbes   { background: #EAF0FB; color: #1A4F85; border-bottom: 2px solid #3AABDC; }
.vocab-section-head.adj      { background: #FEF5E8; color: #7D5A0A; border-bottom: 2px solid #D4A017; }
.vocab-section-head.express  { background: #F5EAF8; color: #6B1E7A; border-bottom: 2px solid #A855B5; }

.vocab-section-head .vc-cn {
  font-family: 'Noto Serif SC', serif;
  font-size: .72rem;
  font-weight: 400;
  text-transform: none;
  letter-spacing: 0;
  opacity: .75;
}

.vocab-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: .6rem;
  padding: .9rem 1rem;
}

.vocab-card {
  background: #FAFCFE;
  border: 1px solid #E5EEF5;
  border-radius: 8px;
  padding: .6rem .8rem;
  cursor: default;
}

.vocab-word {
  font-size: .92rem;
  font-weight: 700;
  color: var(--mli-dark);
  margin-bottom: .1rem;
}

.vocab-cn-label {
  font-family: 'Noto Serif SC', serif;
  font-size: .72rem;
  color: var(--mli-grey);
  margin-bottom: .3rem;
}

.vocab-ex {
  font-size: .75rem;
  color: #555;
  font-style: italic;
  border-left: 2px solid #D0DDE8;
  padding-left: .5rem;
  line-height: 1.45;
}

/* ══════════════════════════════
   PRACTICE
══════════════════════════════ */
.practice-container {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.practice-intro {
  background: linear-gradient(135deg, #EAF5F0, #EBF2FB);
  border-radius: 10px;
  padding: 1rem 1.2rem;
  font-size: .84rem;
  color: var(--mli-dark);
  line-height: 1.6;
  border-left: 3px solid var(--mli-green);
}

.practice-intro strong { color: var(--mli-blue); }

.practice-name-bar {
  display: flex;
  gap: .8rem;
  align-items: center;
}

.practice-name-bar label {
  font-size: .8rem;
  font-weight: 700;
  color: var(--mli-grey);
  white-space: nowrap;
}

.practice-name-input {
  flex: 1;
  border: 1.5px solid #C8D8E8;
  border-radius: 8px;
  padding: .45rem .8rem;
  font-family: 'Lato', sans-serif;
  font-size: .88rem;
  color: var(--mli-dark);
  outline: none;
  transition: border-color .18s;
}

.practice-name-input:focus { border-color: var(--mli-blue); }

.practice-block {
  background: white;
  border: 1.5px solid #E0EDF5;
  border-radius: 10px;
  overflow: hidden;
}

.practice-block-head {
  padding: .6rem 1rem;
  font-size: .75rem;
  font-weight: 700;
  letter-spacing: .07em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.practice-block-head.intro-h  { background: #EAF5F0; color: #1E6B4A; border-bottom: 2px solid #5DB88A; }
.practice-block-head.dev-h    { background: #EAF0FB; color: #1A4F85; border-bottom: 2px solid #3AABDC; }
.practice-block-head.ccl-h    { background: #FEF5E8; color: #7D5A0A; border-bottom: 2px solid #D4A017; }

.practice-hint {
  font-family: 'Noto Serif SC', serif;
  font-size: .7rem;
  font-weight: 400;
  text-transform: none;
  letter-spacing: 0;
  opacity: .75;
}

.practice-textarea {
  width: 100%;
  border: none;
  padding: .9rem 1rem;
  font-family: 'Lato', sans-serif;
  font-size: .88rem;
  line-height: 1.65;
  color: var(--mli-dark);
  resize: vertical;
  min-height: 90px;
  outline: none;
  background: white;
  box-sizing: border-box;
}

.practice-textarea::placeholder { color: #A0B0C0; font-style: italic; }

.practice-actions {
  display: flex;
  gap: .7rem;
  flex-wrap: wrap;
  margin-top: .5rem;
}

.btn-export {
  display: inline-flex;
  align-items: center;
  gap: .4rem;
  background: linear-gradient(135deg, var(--mli-blue), var(--mli-green));
  color: white;
  border: none;
  border-radius: 20px;
  padding: .55rem 1.2rem;
  font-family: 'Lato', sans-serif;
  font-size: .82rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: .03em;
  transition: opacity .18s;
}
.btn-export:hover { opacity: .88; }

.btn-show-ref {
  display: inline-flex;
  align-items: center;
  gap: .4rem;
  background: white;
  color: var(--mli-blue);
  border: 1.5px solid var(--mli-blue);
  border-radius: 20px;
  padding: .5rem 1.1rem;
  font-family: 'Lato', sans-serif;
  font-size: .82rem;
  font-weight: 700;
  cursor: pointer;
  transition: all .18s;
}
.btn-show-ref:hover { background: var(--mli-blue); color: white; }

.btn-clear {
  display: inline-flex;
  align-items: center;
  gap: .4rem;
  background: none;
  color: #C04040;
  border: 1.5px solid #C04040;
  border-radius: 20px;
  padding: .5rem 1rem;
  font-family: 'Lato', sans-serif;
  font-size: .82rem;
  font-weight: 700;
  cursor: pointer;
  transition: all .18s;
}
.btn-clear:hover { background: #C04040; color: white; }

.practice-ref {
  background: #F5F8FC;
  border: 1.5px solid #C8D8E8;
  border-radius: 10px;
  padding: 1.1rem 1.2rem;
  margin-top: .5rem;
  font-size: .84rem;
  line-height: 1.75;
  color: var(--mli-dark);
  display: none;
}

.practice-ref .ref-label {
  font-size: .7rem;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--mli-blue);
  margin-bottom: .6rem;
}

.practice-ref .ref-fill {
  color: #1A5276;
  font-weight: 600;
}

.export-preview {
  background: white;
  border: 1.5px solid #C8D8E8;
  border-radius: 10px;
  padding: 1.2rem 1.4rem;
  margin-top: .5rem;
  font-size: .84rem;
  line-height: 1.75;
  display: none;
}

.export-preview h3 {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  margin-bottom: .2rem;
  color: var(--mli-dark);
}

.export-preview .export-meta {
  font-size: .75rem;
  color: var(--mli-grey);
  margin-bottom: .8rem;
  font-style: italic;
}

.export-preview .export-section {
  font-weight: 700;
  color: var(--mli-blue);
  margin-top: .7rem;
  margin-bottom: .2rem;
  text-decoration: underline;
  text-underline-offset: 3px;
}

.export-copy-bar {
  display: flex;
  gap: .6rem;
  margin-top: .8rem;
}

.btn-copy {
  background: var(--mli-blue);
  color: white;
  border: none;
  border-radius: 20px;
  padding: .45rem 1rem;
  font-family: 'Lato', sans-serif;
  font-size: .8rem;
  font-weight: 700;
  cursor: pointer;
  transition: opacity .18s;
}
.btn-copy:hover { opacity: .85; }

.char-count {
  font-size: .7rem;
  color: var(--mli-grey);
  text-align: right;
  padding: .2rem .8rem .2rem 0;
}

/* notes */
.notes-block {
  background: white;
  border: 1.5px solid #E0EDF5;
  border-radius: 10px;
  overflow: hidden;
}
.notes-head {
  padding: .6rem 1rem;
  font-size: .75rem;
  font-weight: 700;
  letter-spacing: .07em;
  text-transform: uppercase;
  background: #F0F7FB;
  color: var(--mli-grey);
  border-bottom: 1.5px solid #E0EDF5;
}
.notes-textarea {
  width: 100%;
  border: none;
  padding: .9rem 1rem;
  font-family: 'Lato', sans-serif;
  font-size: .86rem;
  line-height: 1.7;
  color: var(--mli-dark);
  resize: vertical;
  min-height: 80px;
  outline: none;
  background: white;
  box-sizing: border-box;
}
.notes-textarea::placeholder { color: #A0B0C0; font-style: italic; }
.notes-save-bar {
  display: flex;
  align-items: center;
  gap: .7rem;
  padding: .5rem .8rem;
  background: #F8FAFB;
  border-top: 1px solid #E5EEF5;
}
.btn-save-note {
  background: var(--mli-green);
  color: white;
  border: none;
  border-radius: 16px;
  padding: .35rem .85rem;
  font-family: 'Lato', sans-serif;
  font-size: .76rem;
  font-weight: 700;
  cursor: pointer;
  transition: opacity .18s;
}
.btn-save-note:hover { opacity: .85; }
.note-saved-msg {
  font-size: .73rem;
  color: var(--mli-green);
  font-weight: 700;
  display: none;
}

.cat-page-header {
  display:flex; align-items:center; gap:1rem;
  background:linear-gradient(135deg,var(--mli-blue) 0%,#2A8FBE 60%,var(--mli-green) 100%);
  border-radius:12px; padding:1.2rem 1.6rem; margin-bottom:1.4rem; color:white;
}
.cat-page-icon { font-size:2.2rem; line-height:1; }
.cat-page-title { font-size:1.3rem; font-weight:700; letter-spacing:.02em; }
.cat-page-cn { font-family:"Noto Serif SC",serif; font-size:.85rem; opacity:.85; margin-top:.2rem; }
</style>
</head>

//  TAB SWITCHER
// ═══════════════════════════════════════════════
function switchTab(name) {
  document.querySelectorAll('.dtab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.dtab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  // find button by onclick
  document.querySelectorAll('.dtab').forEach(b => {
    if (b.getAttribute('onclick') === "switchTab('" + name + "')") b.classList.add('active');
  });
}

//  BUILD VOCAB
// ═══════════════════════════════════════════════
function buildVocab(catId) {
  const v = VOCAB[catId];
  if (!v) return;
  const sections = [
    { key:'noms',    label:'Noms', cn:'名词', icon:'🔵' },
    { key:'verbes',  label:'Verbes', cn:'动词', icon:'🟢' },
    { key:'adj',     label:'Adjectifs', cn:'形容词', icon:'🟡' },
    { key:'express', label:'Expressions clés', cn:'关键表达', icon:'🟣' },
  ];
  const el = document.getElementById('vocab-container');
  if (!el) return;
  el.innerHTML = sections.map(s => {
    const words = v[s.key] || [];
    if (!words.length) return '';
    return `
      <div class="vocab-section">
        <div class="vocab-section-head ${s.key === 'noms' ? 'noms' : s.key === 'verbes' ? 'verbes' : s.key === 'adj' ? 'adj' : 'express'}">
          ${s.icon} ${s.label} <span class="vc-cn">· ${s.cn}</span>
        </div>
        <div class="vocab-grid">
          ${words.map(w => `
            <div class="vocab-card">
              <div class="vocab-word">${w.w}</div>
              <div class="vocab-cn-label">${w.cn}</div>
              <div class="vocab-ex">${w.ex}</div>
            </div>
          `).join('')}
        </div>
      </div>`;
  }).join('');
}

  const el = document.getElementById('practice-container');
  if (!el) return;

  const lc = s => s.charAt(0).toLowerCase() + s.slice(1);
  const p1 = q.pour[0], p2 = q.pour[1] || q.pour[0], c1 = q.contre[0];

  // Build reference example paragraphs
  const refIntro = `Merci de m'avoir donné la parole. La question posée est : « ${q.fr} » Pour ma part, je pense que <span class="ref-fill">[votre position]</span>, et je vais vous expliquer pourquoi en deux arguments.`;
  const refDev = `Tout d'abord, <span class="ref-fill">${lc(p1.arg)}</span>. Par exemple, ${p1.ex}<br><br>Ensuite, il faut souligner que <span class="ref-fill">${lc(p2.arg)}</span>. En effet, ${p2.ex}<br><br>Cependant, je reconnais que <span class="ref-fill">${lc(c1.arg)}</span>. En effet, ${c1.ex} Malgré cela, je maintiens ma position.`;
  const refCcl = `En conclusion, pour répondre à la question posée, je pense que <span class="ref-fill">${lc(p1.arg)}, et que ${lc(p2.arg)}</span>. Ces éléments me semblent fondamentaux. Et je vous remercie de m'avoir écouté(e).`;

  el.innerHTML = `
    <div class="practice-intro">
      <strong>✏️ Zone de pratique libre</strong> — 自由练习区<br>
      <span style="font-size:.8rem;color:#4A5A6A">Écrivez votre propre réponse ci-dessous. Cliquez sur <strong>Voir exemple</strong> pour comparer. Utilisez <strong>Exporter</strong> pour envoyer votre travail à votre professeur.</span>
    </div>

    <div class="practice-name-bar">
      <label>👤 Nom de l'étudiant :</label>
      <input class="practice-name-input" id="practice-name" type="text" placeholder="Entrez votre prénom et nom…">
    </div>

    <div class="practice-block">
      <div class="practice-block-head intro-h">
        Introduction <span class="practice-hint">开头段 · ~30 secondes</span>
      </div>
      <textarea class="practice-textarea" id="prac-intro" rows="4"
        placeholder="Merci de m'avoir donné la parole. La question est : « ${q.fr} » Pour ma part, je pense que…"></textarea>
      <div class="char-count" id="cc-intro">0 mots</div>
    </div>

    <div class="practice-block">
      <div class="practice-block-head dev-h">
        Développement <span class="practice-hint">论述段 · ~3 minutes</span>
      </div>
      <textarea class="practice-textarea" id="prac-dev" rows="7"
        placeholder="Tout d'abord… Par exemple… Ensuite… En effet… Cependant… Malgré cela…"></textarea>
      <div class="char-count" id="cc-dev">0 mots</div>
    </div>

    <div class="practice-block">
      <div class="practice-block-head ccl-h">
        Conclusion <span class="practice-hint">结尾段 · ~1 minute</span>
      </div>
      <textarea class="practice-textarea" id="prac-ccl" rows="3"
        placeholder="En conclusion… Et je vous remercie de m'avoir écouté(e)."></textarea>
      <div class="char-count" id="cc-ccl">0 mots</div>
    </div>

    <!-- NOTES -->
    <div class="notes-block">
      <div class="notes-head">📝 Notes personnelles · 个人笔记</div>
      <textarea class="notes-textarea" id="notes-area"
        placeholder="Vocabulaire à retenir, idées, remarques du professeur…"></textarea>
      <div class="notes-save-bar">
        <button class="btn-save-note" onclick="saveNote('${q.fr}')">💾 Sauvegarder</button>
        <span class="note-saved-msg" id="note-saved-msg">✓ Sauvegardé !</span>
        <span style="font-size:.72rem;color:#A0B0C0;margin-left:auto">保存在您自己的浏览器中</span>
      </div>
    </div>

    <div class="practice-actions">
      <button class="btn-show-ref" onclick="toggleRef()">👁 Voir exemple de référence · 查看参考</button>
      <button class="btn-export" onclick="exportWork('${q.fr.replace(/'/g,"\'")}')">📤 Exporter pour le professeur · 导出作业</button>
      <button class="btn-clear" onclick="clearPractice()">🗑 Effacer tout</button>
    </div>

    <div class="practice-ref" id="practice-ref">
      <div class="ref-label">📖 Exemple de référence · 参考范文</div>
      <p><strong style="color:var(--mli-blue)">Introduction</strong><br>${refIntro}</p>
      <p style="margin-top:.8rem"><strong style="color:var(--mli-blue)">Développement</strong><br>${refDev}</p>
      <p style="margin-top:.8rem"><strong style="color:var(--mli-blue)">Conclusion</strong><br>${refCcl}</p>
    </div>

    <div class="export-preview" id="export-preview">
      <h3>📄 Devoir — TCF Canada Tâche 3</h3>
      <div class="export-meta" id="export-meta"></div>
      <div class="export-section">Introduction</div>
      <div id="exp-intro-text"></div>
      <div class="export-section">Développement</div>
      <div id="exp-dev-text"></div>
      <div class="export-section">Conclusion</div>
      <div id="exp-ccl-text"></div>
      <div class="export-section">Notes personnelles</div>
      <div id="exp-notes-text"></div>
      <div class="export-copy-bar">
        <button class="btn-copy" onclick="copyExport()">📋 Copier tout</button>
        <button class="btn-copy" style="background:var(--mli-green)" onclick="downloadExport()">⬇ Télécharger .txt</button>
      </div>
    </div>
  `;

  // Load saved note if any
  const savedNote = localStorage.getItem('note_' + q.fr);
  if (savedNote) document.getElementById('notes-area').value = savedNote;

  // Word counters
  ['intro','dev','ccl'].forEach(id => {
    const ta = document.getElementById('prac-' + id);
    const cc = document.getElementById('cc-' + id);
    ta.addEventListener('input', () => {
      const words = ta.value.trim().split(/\s+/).filter(w => w.length > 0).length;
      cc.textContent = words + ' mot' + (words !== 1 ? 's' : '');
    });
  });
}

function saveNote(qfr) {
  const note = document.getElementById('notes-area');
  if (!note) return;
  localStorage.setItem('note_' + qfr, note.value);
  const msg = document.getElementById('note-saved-msg');
  msg.style.display = 'inline';
  setTimeout(() => msg.style.display = 'none', 2000);
}

function toggleRef() {
  const ref = document.getElementById('practice-ref');
  const btn = event.target;
  const isOpen = ref.style.display === 'block';
  ref.style.display = isOpen ? 'none' : 'block';
  btn.textContent = isOpen ? '👁 Voir exemple de référence · 查看参考' : '🙈 Masquer exemple · 隐藏参考';
}

function clearPractice() {
  if (!confirm('Effacer toutes vos réponses ?')) return;
  ['prac-intro','prac-dev','prac-ccl'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.value = ''; el.dispatchEvent(new Event('input')); }
  });
  const ep = document.getElementById('export-preview');
  if (ep) ep.style.display = 'none';
}

function exportWork(qfr) {
  const name = document.getElementById('practice-name')?.value.trim() || '（sans nom）';
  const intro = document.getElementById('prac-intro')?.value.trim() || '—';
  const dev   = document.getElementById('prac-dev')?.value.trim() || '—';
  const ccl   = document.getElementById('prac-ccl')?.value.trim() || '—';
  const notes = document.getElementById('notes-area')?.value.trim() || '—';
  const date  = new Date().toLocaleDateString('fr-CA');

  document.getElementById('export-meta').textContent = 'Étudiant : ' + name + ' · Sujet : ' + qfr + ' · Date : ' + date;
  document.getElementById('exp-intro-text').textContent = intro;
  document.getElementById('exp-dev-text').textContent = dev;
  document.getElementById('exp-ccl-text').textContent = ccl;
  document.getElementById('exp-notes-text').textContent = notes;

  const ep = document.getElementById('export-preview');
  ep.style.display = 'block';
  ep.scrollIntoView({ behavior:'smooth', block:'start' });
}

function copyExport() {
  const name = document.getElementById('practice-name')?.value.trim() || '（sans nom）';
  const intro = document.getElementById('prac-intro')?.value.trim() || '—';
  const dev   = document.getElementById('prac-dev')?.value.trim() || '—';
  const ccl   = document.getElementById('prac-ccl')?.value.trim() || '—';
  const notes = document.getElementById('notes-area')?.value.trim() || '—';
  const qfr   = document.getElementById('detail-qfr')?.textContent || '';
  const date  = new Date().toLocaleDateString('fr-CA');

  const text = `DEVOIR — TCF Canada Tâche 3
Étudiant : ${name}
Sujet : ${qfr}
Date : ${date}

=== INTRODUCTION ===
${intro}

=== DÉVELOPPEMENT ===
${dev}

=== CONCLUSION ===
${ccl}

=== NOTES PERSONNELLES ===
${notes}`;

  navigator.clipboard.writeText(text).then(() => alert('✅ Copié dans le presse-papiers !'));
}

function downloadExport() {
  const name = document.getElementById('practice-name')?.value.trim() || 'etudiant';
  const intro = document.getElementById('prac-intro')?.value.trim() || '—';
  const dev   = document.getElementById('prac-dev')?.value.trim() || '—';
  const ccl   = document.getElementById('prac-ccl')?.value.trim() || '—';
  const notes = document.getElementById('notes-area')?.value.trim() || '—';
  const qfr   = document.getElementById('detail-qfr')?.textContent || 'sujet';
  const date  = new Date().toLocaleDateString('fr-CA');

  const text = `DEVOIR — TCF Canada Tâche 3
Étudiant : ${name}
Sujet : ${qfr}
Date : ${date}

=== INTRODUCTION ===
${intro}

=== DÉVELOPPEMENT ===
${dev}

=== CONCLUSION ===
${ccl}

=== NOTES PERSONNELLES ===
${notes}`;

  const blob = new Blob([text], { type:'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'TCF_T3_' + name.replace(/\s+/g,'_') + '_' + date + '.txt';
  a.click();
  URL.revokeObjectURL(url);
}

// ═══════════════════════════════════════════════
//  BUILD DETAIL
// ═══════════════════════════════════════════════
function buildDetail(q) {
  document.getElementById('detail-qfr').textContent = q.fr;
  document.getElementById('detail-qcn').textContent = q.cn;

  // Reset to Arguments tab
  switchTab('arguments');

  // Build vocab and practice panels
  buildVocab(q.cat);
  buildPractice(q);

  // POUR
  const pourEl = document.getElementById('arg-pour');
  pourEl.innerHTML = q.pour.map(a => `
    <div class="arg-item">
      <div class="arg-main">• ${a.arg}</div>
      <div class="arg-cn-small">${a.cn}</div>
      <div class="arg-ex">Exemple : ${a.ex}</div>
    </div>
  `).join('');

  // CONTRE
  const contreEl = document.getElementById('arg-contre');
  contreEl.innerHTML = q.contre.map(a => `
    <div class="arg-item">
      <div class="arg-main">• ${a.arg}</div>
      <div class="arg-cn-small">${a.cn}</div>
      <div class="arg-ex">Exemple : ${a.ex}</div>
    </div>
  `).join('');

  // WORD TEMPLATE — complete sentences with (可替换) hints
  const p1 = q.pour[0];
  const p2 = q.pour[1] || q.pour[0];
  const c1 = q.contre[0];
  const lc = s => s.charAt(0).toLowerCase() + s.slice(1);

  document.getElementById('word-doc').innerHTML = `
    <div class="doc-title">TCF Canada – Tâche 3 : Expression d'un point de vue</div>
    <div class="doc-sub">${q.fr}</div>
    <hr>

    <p><span class="word-section-head">Introduction</span> <span class="word-tag">开头段</span></p>
    <p style="margin-top:.55rem">
      Merci de m'avoir donné la parole.
      <span class="word-note">礼貌开场，感谢考官给予发言机会。</span>
    </p>
    <p style="margin-top:.45rem">
      C'est un sujet très intéressant <span class="word-sub">（可替换：important / complexe / d'actualité）</span>.
      <span class="word-note">表达对话题的兴趣，显示积极态度。</span>
    </p>
    <p style="margin-top:.45rem">
      La question est : <span class="word-highlight">${q.fr}</span>
      <span class="word-note">重申题目，让听者明白你理解了讨论的焦点。</span>
    </p>
    <p style="margin-top:.45rem">
      Pour ma part, je pense que <span class="word-fill">c'est un sujet qui mérite une réponse nuancée</span> <span class="word-sub">（用自己的立场替换此句）</span>, et je vais vous expliquer pourquoi.
      <span class="word-note">明确表达个人立场，并预告接下来的论述内容。</span>
    </p>

    <hr>
    <p><span class="word-section-head">Développement</span> <span class="word-tag">论述段</span></p>

    <p style="margin-top:.65rem"><strong>Premier argument <span class="word-tag">论点一</span></strong></p>
    <p style="margin-top:.35rem">
      Tout d'abord, je voudrais souligner que <span class="word-fill">${lc(p1.arg)}</span>.
      <span class="word-note">用 « Tout d'abord » 引出第一个论点，清晰有条理。</span>
    </p>
    <p style="margin-top:.3rem">
      Par exemple, <span class="word-fill">${p1.ex}</span> <span class="word-sub">（可用自己的例子替换）</span>
      <span class="word-note">具体例子使论点更有说服力，越真实越好。</span>
    </p>
    <p style="margin-top:.3rem">
      C'est pourquoi je pense que <span class="word-fill">${lc(p1.arg)}</span> est un aspect fondamental.
      <span class="word-note">结尾小句强调论点，收尾有力。</span>
    </p>

    <p style="margin-top:.8rem"><strong>Deuxième argument <span class="word-tag">论点二</span></strong></p>
    <p style="margin-top:.35rem">
      Ensuite, il est important de mentionner que <span class="word-fill">${lc(p2.arg)}</span>.
      <span class="word-note">用 « Ensuite » 过渡到第二论点，保持结构清晰。</span>
    </p>
    <p style="margin-top:.3rem">
      En effet, <span class="word-fill">${p2.ex}</span> <span class="word-sub">（可用自己的例子替换）</span>
      <span class="word-note">用 « En effet » 引出佐证，加强说服力。</span>
    </p>
    <p style="margin-top:.3rem">
      Cela montre bien que <span class="word-fill">${lc(p2.arg)}</span> joue un rôle essentiel dans ce débat.
      <span class="word-note">总结本段，强调论点与主题的关联性。</span>
    </p>

    <p style="margin-top:.8rem"><strong>Nuance / Contre-argument <span class="word-tag">转折反驳</span></strong></p>
    <p style="margin-top:.35rem">
      Cependant, je reconnais que <span class="word-fill">${lc(c1.arg)}</span>.
      <span class="word-note">用 « Cependant » 承认对立观点，体现思维的全面性与平衡感。</span>
    </p>
    <p style="margin-top:.3rem">
      En effet, <span class="word-fill">${c1.ex}</span> <span class="word-sub">（可用自己的例子替换）</span>
      <span class="word-note">用事实说明对立面的合理性，显示论述不偏激。</span>
    </p>
    <p style="margin-top:.3rem">
      Malgré cela, je reste convaincu(e) que <span class="word-fill">${lc(p1.arg)}</span> demeure l'argument le plus déterminant <span class="word-sub">（可替换为自己的核心立场）</span>.
      <span class="word-note">用 « Malgré cela » 拉回自己的立场，完成转折，逻辑完整。</span>
    </p>

    <hr>
    <p><span class="word-section-head">Conclusion</span> <span class="word-tag">结尾段</span></p>
    <p style="margin-top:.55rem">
      En conclusion, pour répondre à la question posée, je pense que <span class="word-fill">${lc(p1.arg)}, et que ${lc(p2.arg)}</span> <span class="word-sub">（用自己的立场总结替换）</span>.
      <span class="word-note">重申立场，简洁呼应开头，逻辑首尾一贯。</span>
    </p>
    <p style="margin-top:.45rem">
      Ces deux éléments me semblent essentiels pour aborder ce sujet de manière équilibrée <span class="word-sub">（可替换为自己的总结语）</span>.
      <span class="word-note">对整体论述做评价，体现思维深度。</span>
    </p>
    <p style="margin-top:.7rem">
      Et je vous remercie de m'avoir écouté(e).
      <span class="word-note">礼貌结束发言，留下良好印象。</span>
    </p>
  `;
}


// ── Navigation ──
function goBack() {
  document.getElementById('view-detail').style.display = 'none';
  document.getElementById('view-list').style.display = '';
  window.scrollTo(0, 0);
}

function openDetail(q) {
  buildDetail(q);
  buildVocab(q.cat);
  buildPractice(q);
  switchTab('arguments');
  document.getElementById('view-list').style.display = 'none';
  document.getElementById('view-detail').style.display = '';
  window.scrollTo(0, 0);
}

function toggleExtra() {
  const panel = document.getElementById('extra-panel');
  const btn   = document.getElementById('extra-toggle-btn');
  const open  = panel.style.display !== 'none';
  panel.style.display = open ? 'none' : 'block';
  btn.classList.toggle('active', !open);
}

function pickRandom(catId) {
  const extras = EXTRA[catId] || [];
  if (!extras.length) return;
  const q  = extras[Math.floor(Math.random() * extras.length)];
  const el = document.getElementById('random-result-' + catId);
  el.style.display = 'block';
  el.innerHTML = '<div class="random-q">🎙️ ' + q + '</div>';
}

// ── Init ──
(function init() {
  const qs     = QS.filter(function(q) { return q.cat === CAT_ID; });
  const extras = EXTRA[CAT_ID] || [];

  // Extra panel
  if (extras.length > 0) {
    document.getElementById('extra-toggle-btn').style.display = '';
    document.getElementById('extra-count').textContent = '(' + extras.length + ')';
    var rows = extras.map(function(q, i) {
      return '<div class="extra-item"><span class="extra-num">' + (i+1) +
             '</span><span class="extra-text">' + q + '</span></div>';
    }).join('');
    document.getElementById('extra-panel').innerHTML =
      '<div class="extra-random-bar">' +
        '<button class="random-btn" onclick="pickRandom(CAT_ID)">🎲 Tirer un sujet au hasard · 随机抽题</button>' +
        '<div class="random-result" id="random-result-placeholder" style="display:none"></div>' +
      '</div>' +
      '<div class="extra-list">' + rows + '</div>';
    // Fix the result div id after insert
    document.getElementById('random-result-placeholder').id = 'random-result-' + CAT_ID;
  }

  // Question rows
  const grid = document.getElementById('qGrid');
  qs.forEach(function(q, i) {
    var row = document.createElement('div');
    row.className = 'q-row';
    row.innerHTML =
      '<div class="q-num-badge">' + (i+1) + '</div>' +
      '<div class="q-row-text">' +
        '<div class="q-row-fr">' + q.fr + '</div>' +
        '<div class="q-row-cn">' + q.cn + '</div>' +
      '</div><div class="q-arrow">›</div>';
    row.onclick = function() { openDetail(q); };
    grid.appendChild(row);
  });
})();

</script>
